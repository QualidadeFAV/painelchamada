<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor Hospitalar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 300px;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
        }

        .controle {
            margin-bottom: 18px;
        }

        .label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: #ccc;
        }

        .valor {
            font-weight: bold;
            color: #00ff00;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00ff00;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(0, 255, 0, 0.6);
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00ff00;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 6px rgba(0, 255, 0, 0.6);
        }

        .section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00ff00;
        }

        .checkbox-group label {
            font-size: 12px;
            color: #ccc;
            cursor: pointer;
        }

        .input-prefix {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .input-prefix label {
            font-size: 12px;
            color: #ccc;
        }

        .input-prefix input[type="text"] {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #333;
            background: #0a0a0a;
            color: #00ff00;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .input-prefix input[type="text"]:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 6px rgba(0, 255, 0, 0.3);
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: #00a8e8;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #0088c8;
            box-shadow: 0 0 10px rgba(0, 168, 232, 0.5);
        }

        button:last-child {
            background: #666;
        }

        button:last-child:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="header">🔊 LEITOR</div>

    <div class="controle">
        <div class="label">
            <span>🔊 Volume</span>
            <span class="valor" id="label-volume">100%</span>
        </div>
        <input type="range" id="slider-volume" min="0" max="100" value="100" />
    </div>

    <div class="controle">
        <div class="label">
            <span>⚡ Velocidade</span>
            <span class="valor" id="label-velocidade">85%</span>
        </div>
        <input type="range" id="slider-velocidade" min="50" max="150" value="85" />
    </div>

    <div class="section">
        <div class="checkbox-group">
            <input type="checkbox" id="checkbox-ativar" checked>
            <label for="checkbox-ativar">Ativar extensão</label>
        </div>

        <div class="input-prefix">
            <label for="input-prefixo">Prefixo:</label>
            <input type="text" id="input-prefixo" placeholder="Ex: FICHA" value="FICHA">
        </div>

        <button id="btn-mapear">📍 Mapear Área</button>
        <button id="btn-limpar-mapa">🔄 Voltar ao Centro</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
